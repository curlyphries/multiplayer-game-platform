version: '3.8'

services:
  backend:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=development
      - PORT=4001
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:4000
    depends_on:
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"

  frontend:
    image: node:18-alpine
    working_dir: /app
    ports:
      - "4000:4000"
    environment:
      - VITE_SERVER_URL=http://localhost:4001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data:
